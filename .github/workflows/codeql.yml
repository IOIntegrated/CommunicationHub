# CodeQL – Static Analysis (JS/TS, C#)
# Plandokument: ../../docs/plan/12-security-compliance.md

name: codeql

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - '.github/workflows/codeql.yml'
  # Sprint 1: weekly full-scan re-aktivieren, sobald echter Quellcode existiert
  # schedule:
  #   - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Sprint 0: nur Quellanalyse, keine Builds erforderlich (Skeleton-Repo).
          # Sprint 1: csharp ergänzen, sobald .csproj/.sln vorhanden sind, dann build-mode: autobuild.
          - language: javascript-typescript
            build-mode: none
          - language: csharp
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # TODO Sprint 1: queries: 'security-extended,security-and-quality'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
