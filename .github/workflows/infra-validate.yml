# Infra – Bicep build + what-if (PR) + deploy (workflow_dispatch, OIDC)
# Plandokument: ../../docs/plan/19-repo-scaffolding.md §4
name: infra-validate

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-validate.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Zielumgebung'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]
      action:
        description: 'what-if oder deploy'
        required: true
        default: 'what-if'
        type: choice
        options: [what-if, deploy]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: infra-validate-${{ github.ref }}-${{ github.event.inputs.env || 'pr' }}
  cancel-in-progress: true

jobs:
  bicep-build:
    name: Bicep build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep
        run: az bicep install
      - name: Bicep version
        run: az bicep version
      - name: Bicep build (main + alle Module)
        run: |
          set -e
          az bicep build --file infra/bicep/main.bicep
          for f in infra/bicep/modules/*.bicep; do
            echo "--- building $f ---"
            az bicep build --file "$f" --stdout > /dev/null
          done
      - name: Bicep params build (alle Umgebungen)
        run: |
          set -e
          for p in infra/bicep/parameters/*.bicepparam; do
            echo "--- building $p ---"
            az bicep build-params --file "$p" --stdout > /dev/null
          done

  what-if:
    name: What-if (${{ inputs.env }})
    runs-on: ubuntu-latest
    needs: bicep-build
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'what-if'
    environment: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install Bicep
        run: az bicep install
      - name: What-if (rg-commhub-${{ inputs.env }})
        run: |
          az deployment group what-if \
            --resource-group rg-commhub-${{ inputs.env }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ inputs.env }}.bicepparam

  deploy:
    name: Deploy (${{ inputs.env }})
    runs-on: ubuntu-latest
    needs: bicep-build
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'
    environment: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install Bicep
        run: az bicep install
      - name: Deploy (rg-commhub-${{ inputs.env }})
        run: |
          az deployment group create \
            --resource-group rg-commhub-${{ inputs.env }} \
            --name commhub-${{ github.run_id }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ inputs.env }}.bicepparam
