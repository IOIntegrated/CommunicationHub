# Backend CI – Communication Copilot Service (.NET 8)
# Plandokument: ../../docs/plan/19-repo-scaffolding.md §4
# Status: Skelett (Sprint 0) – ruft noch keinen echten Build aus.

name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  # OIDC Federated Identity gegen Azure (kein Client-Secret in GH Secrets):
  id-token: write
  # CodeQL/Security-Uploads (falls aktiviert):
  security-events: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

